<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Automático Poquetzal-1</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-size: 20px; color: #1e293b; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .file-list { list-style: none; padding: 0; margin: 0; }
        
        /* FILA DEL ARCHIVO: Todo en una sola línea horizontal */
        .file-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 8px; 
            border-bottom: 1px solid #f1f5f9; 
            gap: 8px;
        }
        .file-item:hover { background-color: #f8fafc; }
        
        /* CONTENEDOR DEL NOMBRE: Recorta el nombre si no cabe a la izquierda */
        .file-info { 
            flex: 1; 
            min-width: 0; 
        }
        .file-name { 
            font-weight: 500; 
            color: #0f172a; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            display: block; 
            font-size: 13px;
        }

        /* CONTENEDOR DE BOTONES: Fijos a la derecha sin romper línea */
        .actions { 
            display: flex; 
            gap: 6px; 
            flex-shrink: 0; 
        }
        
        .btn { 
            padding: 6px 10px; 
            border-radius: 6px; 
            font-size: 12px; 
            text-decoration: none; 
            font-weight: 500; 
            cursor: pointer; 
            border: none; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            white-space: nowrap;
        }
        .btn-view { background-color: #2563eb; color: white; }
        .btn-view:hover { background-color: #1d4ed8; }
        .btn-direct { background-color: #f1f5f9; color: #475569; }
        .btn-direct:hover { background-color: #e2e8f0; }
        
        /* VISOR DE MEDIOS Y REPRODUCTOR */
        #contenedorVisor { margin-top: 20px; width: 100%; display: none; }
        iframe, video, img { width: 100%; border-radius: 8px; border: 1px solid #cbd5e1; }
        iframe { height: 500px; }
        video { max-height: 450px; background-color: #000; }
        img { max-height: 500px; object-fit: contain; }
        .loading { color: #64748b; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>📁 Explorador de Archivos Automático</h1>
    <div id="loading" class="loading">Cargando archivos desde el repositorio...</div>
    <ul class="file-list" id="listaArchivos"></ul>
    
    <!-- Reproductores y visores -->
    <div id="contenedorVisor"></div>
</div>

<script>
    const USUARIO_GITHUB = 'sergnaru95';
    const REPOSITORIO = 'poquetzal-1';

    const urlApi = `https://api.github.com/repos/${USUARIO_GITHUB}/${REPOSITORIO}/contents/`;

    async function cargarArchivos() {
        try {
            const respuesta = await fetch(urlApi);
            const archivos = await respuesta.json();
            
            const listaUI = document.getElementById('listaArchivos');
            document.getElementById('loading').style.display = 'none';
            
            const extensionesDocumento = ['docx', 'xlsx', 'pptx', 'pdf', 'doc', 'xls', 'ppt'];
            const extensionesVideo = ['mp4', 'webm', 'mov', 'mkv', 'avi'];
            const extensionesImagen = ['jpg', 'jpeg', 'png', 'gif', 'webp'];

            archivos.forEach(archivo => {
                if (archivo.name.toLowerCase() === 'index.html' || archivo.name.startsWith('.')) {
                    return;
                }

                const extension = archivo.name.split('.').pop().toLowerCase();
                const esDocumento = extensionesDocumento.includes(extension);
                const esVideo = extensionesVideo.includes(extension);
                const esImagen = extensionesImagen.includes(extension);

                const li = document.createElement('li');
                li.className = 'file-item';

                let textoBoton = 'Abrir / Ver';
                let accionBoton = '';

                if (esDocumento) {
                    if (['xlsx', 'xls'].includes(extension)) textoBoton = 'Ver en Google Sheets';
                    else if (['pptx', 'ppt'].includes(extension)) textoBoton = 'Ver en Google Slides';
                    else textoBoton = 'Ver en Google Docs';
                    
                    accionBoton = `verDocumento('${archivo.download_url}')`;
                } else if (esVideo) {
                    textoBoton = 'Abrir / Ver';
                    accionBoton = `verVideo('${archivo.download_url}')`;
                } else if (esImagen) {
                    textoBoton = 'Abrir / Ver';
                    accionBoton = `verImagen('${archivo.download_url}')`;
                } else {
                    textoBoton = 'Abrir / Ver';
                    accionBoton = `window.open('${archivo.download_url}', '_blank')`;
                }

                li.innerHTML = `
                    <div class="file-info" title="${archivo.name}">
                        <span class="file-name">${archivo.name}</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-view" onclick="${accionBoton}">${textoBoton}</button>
                        <a class="btn btn-direct" href="${archivo.download_url}" download target="_blank">Descarga Directa</a>
                    </div>
                `;
                listaUI.appendChild(li);
            });
        } catch (error) {
            document.getElementById('loading').innerText = 'Error al cargar los archivos del repositorio.';
            console.error(error);
        }
    }

    function verDocumento(urlRaw) {
        const visor = document.getElementById('contenedorVisor');
        const urlVisor = 'https://docs.google.com/viewer?url=' + encodeURIComponent(urlRaw) + '&embedded=true';
        visor.innerHTML = `<iframe src="${urlVisor}"></iframe>`;
        visor.style.display = 'block';
        visor.scrollIntoView({ behavior: 'smooth' });
    }

    function verVideo(urlRaw) {
        const visor = document.getElementById('contenedorVisor');
        visor.innerHTML = `
            <video controls autoplay name="media">
                <source src="${urlRaw}" type="video/mp4">
                Tu navegador no soporta reproducción de video.
            </video>`;
        visor.style.display = 'block';
        visor.scrollIntoView({ behavior: 'smooth' });
    }

    function verImagen(urlRaw) {
        const visor = document.getElementById('contenedorVisor');
        visor.innerHTML = `<img src="${urlRaw}" alt="Vista previa">`;
        visor.style.display = 'block';
        visor.scrollIntoView({ behavior: 'smooth' });
    }

    cargarArchivos();
</script>

</body>
</html>
