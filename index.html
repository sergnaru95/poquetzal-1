<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Automático Poquetzal-1</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; color: #1e293b; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .file-list { list-style: none; padding: 0; margin: 0; }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .file-item:hover { background-color: #f8fafc; }
        .file-info { display: flex; align-items: center; gap: 10px; }
        .file-name { font-weight: 500; color: #0f172a; }
        .actions { display: flex; gap: 10px; }
        .btn { padding: 6px 12px; border-radius: 6px; font-size: 13px; text-decoration: none; font-weight: 500; cursor: pointer; border: none; }
        .btn-view { background-color: #2563eb; color: white; }
        .btn-view:hover { background-color: #1d4ed8; }
        .btn-direct { background-color: #f1f5f9; color: #475569; }
        .btn-direct:hover { background-color: #e2e8f0; }
        iframe { width: 100%; height: 600px; border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 20px; display: none; }
        .loading { color: #64748b; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🗂️ Explorador de Archivos Automático</h1>
    <div id="loading" class="loading">Cargando archivos desde el repositorio...</div>
    <ul class="file-list" id="listaArchivos"></ul>
    <iframe id="visorGoogle"></iframe>
</div>

<script>
    const USUARIO_GITHUB = 'sergnaru95';
    const REPOSITORIO = 'poquetzal-1';

    const urlApi = `https://api.github.com/repos/${USUARIO_GITHUB}/${REPOSITORIO}/contents/`;

    async function cargarArchivos() {
        try {
            const respuesta = await fetch(urlApi);
            const archivos = await respuesta.json();
            
            const listaUI = document.getElementById('listaArchivos');
            document.getElementById('loading').style.display = 'none';
            
            const extensionesDocumento = ['docx', 'xlsx', 'pptx', 'pdf', 'doc', 'xls', 'ppt'];
            const extensionesVideo = ['mp4', 'webm', 'mov', 'mkv'];

            archivos.forEach(archivo => {
                if (archivo.name.toLowerCase() === 'index.html' || archivo.name.startsWith('.')) {
                    return;
                }

                const extension = archivo.name.split('.').pop().toLowerCase();
                const esDocumento = extensionesDocumento.includes(extension);
                const esVideo = extensionesVideo.includes(extension);

                const li = document.createElement('li');
                li.className = 'file-item';

                let textoBoton = 'Abrir / Ver';
                if (esDocumento) {
                    if (['xlsx', 'xls'].includes(extension)) textoBoton = 'Ver en Google Sheets';
                    else if (['pptx', 'ppt'].includes(extension)) textoBoton = 'Ver en Google Slides';
                    else textoBoton = 'Ver en Google Docs';
                } else if (['mp3', 'wav', 'ogg'].includes(extension)) {
                    textoBoton = 'Escuchar Audio';
                }

                // Si es video o documento usa el visor del iframe, si no abre enlace directo
                let botonVista;
                if (esDocumento) {
                    botonVista = `<button class="btn btn-view" onclick="verDocumento('${archivo.download_url}')">${textoBoton}</button>`;
                } else if (esVideo) {
                    botonVista = `<button class="btn btn-view" onclick="verMediaDirecto('${archivo.download_url}')">${textoBoton}</button>`;
                } else {
                    botonVista = `<a class="btn btn-view" href="${archivo.download_url}" target="_blank">${textoBoton}</a>`;
                }

                li.innerHTML = `
                    <div class="file-info">
                        <span class="file-name">${archivo.name}</span>
                    </div>
                    <div class="actions">
                        ${botonVista}
                        <a class="btn btn-direct" href="${archivo.download_url}" download target="_blank">Descarga Directa</a>
                    </div>
                `;
                listaUI.appendChild(li);
            });
        } catch (error) {
            document.getElementById('loading').innerText = 'Error al cargar los archivos del repositorio.';
            console.error(error);
        }
    }

    // Para documentos: usa Google Docs Viewer dentro de tu iframe original
    function verDocumento(urlArchivo) {
        const urlVisor = 'https://docs.google.com/viewer?url=' + encodeURIComponent(urlArchivo) + '&embedded=true';
        const iframe = document.getElementById('visorGoogle');
        iframe.src = urlVisor;
        iframe.style.display = 'block';
        iframe.scrollIntoView({ behavior: 'smooth' });
    }

    // Para videos pesados: carga la URL raw directo en el iframe para que no pase por Google Docs
    function verMediaDirecto(urlArchivo) {
        const iframe = document.getElementById('visorGoogle');
        iframe.src = urlArchivo;
        iframe.style.display = 'block';
        iframe.scrollIntoView({ behavior: 'smooth' });
    }

    cargarArchivos();
</script>

</body>
</html>
